<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mai English Center{% endblock %}</title>
    <!-- Use Tailwind CSS with CDN for fast setup and modern minimal look -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom configuration for brand colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#00ADEF', /* Extracted from the Mai English logo */
                            light: '#33BEF2',
                            dark: '#008BBE',
                        },
                        dark: '#111827',
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 flex flex-col min-h-screen text-gray-800">
    
    <!-- Include Navbar -->
    {% include 'includes/navbar.html' %}

    <!-- Main Content Area -->
    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Include Footer -->
    {% include 'includes/footer.html' %}

    {% block extra_scripts %}{% endblock %}
</body>
</html>
