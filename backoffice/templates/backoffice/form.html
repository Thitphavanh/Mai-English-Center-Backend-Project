{% extends "backoffice/base.html" %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} | MAI English Center{% endblock %}
{% block header_title %}{{ title }}{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-8 max-w-4xl mx-auto">
    <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
        <h3 class="text-lg font-semibold text-gray-800"><i class="fas fa-edit mr-2 text-blue-500"></i>Form Details</h3>
        <a href="{{ back_url }}" class="text-sm font-medium text-gray-500 hover:text-gray-800 transition">
            <i class="fas fa-arrow-left mr-1"></i> Back
        </a>
    </div>
    
    <div class="p-8">
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            {{ form|crispy }}
            
            <div class="flex items-center justify-end space-x-4 pt-4 border-t border-gray-100 mt-8">
                <a href="{{ back_url }}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition shadow-sm font-medium">
                    Cancel
                </a>
                <button type="submit" class="px-6 py-2 border border-transparent rounded-lg shadow-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition">
                    <i class="fas fa-save mr-2"></i> Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
